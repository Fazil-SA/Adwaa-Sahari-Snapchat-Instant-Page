<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مؤسسة أضواء صحار للزجاج</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#25D366;
    --green-dark:#1cb455;
    --ink:#1c1c1c;
    --muted:#7a7a7a;
    --bg:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Cairo',sans-serif;
    background:#e9e9eb;
    color:var(--ink);
    display:flex;
    justify-content:center;
  }
  .phone{
    position:relative;
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ---- hero ---- */
  .hero{
    position:relative;
    width:100%;
    aspect-ratio:430/470;
    background:#ddd;
    overflow:hidden;
  }
  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .hero-btn{
    position:absolute;
    top:18px;
    width:46px;height:46px;
    border-radius:50%;
    background:#fff;
    border:none;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    cursor:pointer;
  }
  .hero-btn svg{width:20px;height:20px;color:#222;}
  .hero-btn.flag{right:18px;}
  .hero-btn.back{left:18px;}

  /* ---- content ---- */
  .content{padding:0 22px 140px;}

  .thumbs{
    display:flex;
    gap:12px;
    margin-top:-44px;
    position:relative;
    z-index:2;
    padding:0 2px;
  }
  .thumb{
    flex:1;
    aspect-ratio:1/1.05;
    border-radius:18px;
    overflow:hidden;
    background:#f1ede6;
    border:3px solid #fff;
    box-shadow:0 6px 16px rgba(0,0,0,.12);
    cursor:pointer;
    padding:0;
    transition:transform .15s ease;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb.active{outline:3px solid var(--green);outline-offset:-3px;}
  .thumb:active{transform:scale(.95);}

  .title{
    font-size:34px;
    font-weight:800;
    margin-top:34px;
    line-height:1.3;
  }
  .subtitle{
    font-size:19px;
    font-weight:600;
    color:#555;
    margin-top:8px;
  }
  .note{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:16px;
    color:var(--muted);
    margin-top:22px;
  }
  .dot{
    width:11px;height:11px;border-radius:50%;
    background:var(--green);
    flex:none;
    box-shadow:0 0 0 4px rgba(37,211,102,.18);
  }

  /* ---- sticky CTA ---- */
  .cta-wrap{
    position:fixed;
    bottom:0;left:0;right:0;
    display:flex;justify-content:center;
    padding:16px 22px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,#fff 70%,rgba(255,255,255,0));
    pointer-events:none;
  }
  .cta{
    pointer-events:auto;
    width:100%;
    max-width:386px;
    background:var(--green);
    color:#fff;
    font-family:inherit;
    font-size:21px;
    font-weight:800;
    border:none;
    border-radius:16px;
    padding:18px;
    display:flex;align-items:center;justify-content:center;gap:12px;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(37,211,102,.45);
    transition:transform .12s ease,background .2s;
  }
  .cta:active{transform:scale(.98);background:var(--green-dark);}
  .cta svg{width:26px;height:26px;fill:#fff;flex:none;}
</style>
</head>
<body>
  <div class="phone">

    <div class="hero">
      <img id="heroImg" src="img/a2.png" alt="مرايا مزخرفة">
      <button class="hero-btn flag" aria-label="إبلاغ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V4h13l-2 4 2 4H4"/></svg>
      </button>
      <button class="hero-btn back" aria-label="رجوع" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>

    <div class="content">
      <div class="thumbs" id="thumbs">
        <button class="thumb active" data-src="img/a2.png"><img src="img/a2.png" alt=""></button>
        <button class="thumb" data-src="img/a1.png"><img src="img/a1.png" alt=""></button>
        <button class="thumb" data-src="img/a4.png"><img src="img/a4.png" alt=""></button>
        <button class="thumb" data-src="img/a3.png"><img src="img/a3.png" alt=""></button>
      </div>

      <h1 class="title">مؤسسة أضواء صحار للزجاج</h1>
      <p class="subtitle">لجميع أنواع الزجاج والمرايا</p>

      <div class="note">
        <span class="dot"></span>
        <span>نرد على استفساراتكم فوراً عبر واتساب</span>
      </div>
    </div>

    <div class="cta-wrap">
      <a class="cta" id="waBtn" target="_blank" rel="noopener">
        راسلنا على واتساب الآن
        <svg viewBox="0 0 24 24"><path d="M12.04 2c-5.46 0-9.9 4.44-9.9 9.9 0 1.75.46 3.45 1.32 4.95L2 22l5.3-1.39c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.9-4.44 9.9-9.9S17.5 2 12.04 2zm5.8 14.06c-.24.68-1.42 1.32-1.95 1.36-.5.05-1.13.07-1.82-.11-.42-.13-.96-.31-1.65-.61-2.9-1.25-4.8-4.17-4.94-4.36-.15-.19-1.19-1.58-1.19-3.02s.75-2.14 1.02-2.44c.27-.29.58-.36.77-.36.19 0 .39 0 .56.01.18.01.42-.07.66.5.24.59.83 2.03.9 2.18.07.15.12.32.02.51-.1.19-.15.31-.29.48-.15.17-.31.39-.44.52-.15.15-.3.31-.13.6.17.29.76 1.25 1.63 2.03 1.12 1 2.07 1.31 2.36 1.46.29.15.46.12.63-.07.17-.19.73-.85.92-1.14.19-.29.39-.24.66-.15.27.1 1.7.8 1.99.95.29.15.49.22.56.34.07.12.07.71-.17 1.39z"/></svg>
      </a>
    </div>

  </div>

<script>
  // WhatsApp link
  var phone = "966545951358";
  var msg = "مرحباً، شاهدت إعلانكم على سناب شات وأرغب في معرفة المزيد من التفاصيل.";
  document.getElementById("waBtn").href =
    "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);

  // Thumbnail swap
  var hero = document.getElementById("heroImg");
  document.getElementById("thumbs").addEventListener("click", function(e){
    var btn = e.target.closest(".thumb");
    if(!btn) return;
    hero.src = btn.dataset.src;
    document.querySelectorAll(".thumb").forEach(function(t){t.classList.remove("active");});
    btn.classList.add("active");
  });
</script>
</body>
</html>
